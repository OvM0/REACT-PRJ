<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0aad0a" />
    <meta name="description" content="FreshCart - Fresh Products Delivered to your Door" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css" />
    <title>FreshCart - Fresh Products Delivered</title>
    <style>
      :root {
        --primary: #0aad0a;
        --primary-dark: #088a08;
        --primary-light: #e8f5e9;
        --secondary: #ff6b35;
        --dark: #1a1a2e;
        --text: #2d3436;
        --text-muted: #636e72;
        --border: #e9ecef;
        --white: #ffffff;
        --bg-light: #f8f9fa;
      }
      * { box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; color: var(--text); background: #fff; margin: 0; }
      .text-primary-green { color: var(--primary) !important; }
      .bg-primary-green { background-color: var(--primary) !important; }
      .btn-primary-green { background-color: var(--primary); border-color: var(--primary); color: #fff; }
      .btn-primary-green:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); color: #fff; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
